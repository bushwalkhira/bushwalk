name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Apps Script URL
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
        run: |
          if [ -z "$APPS_SCRIPT_URL" ]; then
            echo "❌ Secret is empty!"
            exit 1
          fi
          sed -i "s|YOUR_SCRIPT_URL_HERE|$APPS_SCRIPT_URL|g" index.html
          echo "✅ Injection result:"
          grep "SCRIPT_URL" index.html | head -3

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -f index.html
          git stash
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          git checkout stash -- index.html
          git add index.html
          git commit -m "Deploy with injected URL"
          git push origin gh-pages --force
